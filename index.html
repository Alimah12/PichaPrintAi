    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const isJointLoaded = () => typeof joint !== 'undefined' && joint.dia && joint.dia.Graph;
        
        // IndexedDB Storage - Stores full binary data for instant history loading
        const Storage = {
            db: null,
            DB_NAME: 'pichaprint_db',
            STORE_NAME: 'designs',
            DB_VERSION: 1,
            
            async init() {
                if (this.db) return this.db;
                
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    
                    request.onerror = () => {
                        console.error('IndexedDB error:', request.error);
                        reject(request.error);
                    };
                    
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };
                    
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
                            const store = db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                            store.createIndex('deviceName', 'deviceName', { unique: false });
                        }
                    };
                });
            },
            
            async addDesign(input, output) {
                await this.init();
                
                // Store EVERYTHING including binary data
                const entry = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    input,
                    output: {
                        device_name: output.device_name,
                        generated_at: output.generated_at,
                        original_prompt: output.original_prompt,
                        downloads: output.downloads,
                        // Full binary data - no deletion!
                        stlData: output.stlData,
                        scadContent: output.scadContent,
                        circuitData: output.circuitData,
                        firmwareContent: output.firmwareContent,
                        bomContent: output.bomContent
                    },
                    deviceName: output.device_name || 'unnamed'
                };
                
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([this.STORE_NAME], 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    const request = store.put(entry);
                    
                    request.onsuccess = () => resolve(entry);
                    request.onerror = () => reject(request.error);
                });
            },
            
            async getHistory() {
                await this.init();
                
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([this.STORE_NAME], 'readonly');
                    const store = tx.objectStore(this.STORE_NAME);
                    const request = store.index('timestamp').openCursor(null, 'prev');
                    const results = [];
                    
                    request.onsuccess = (e) => {
                        const cursor = e.target.result;
                        if (cursor) {
                            results.push(cursor.value);
                            cursor.continue();
                        } else {
                            resolve(results);
                        }
                    };
                    
                    request.onerror = () => reject(request.error);
                });
            },
            
            async loadDesign(id) {
                await this.init();
                
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([this.STORE_NAME], 'readonly');
                    const store = tx.objectStore(this.STORE_NAME);
                    const request = store.get(id);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            
            async deleteDesign(id) {
                await this.init();
                
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([this.STORE_NAME], 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    const request = store.delete(id);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },
            
            async clearHistory() {
                await this.init();
                
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([this.STORE_NAME], 'readwrite');
                    const store = tx.objectStore(this.STORE_NAME);
                    const request = store.clear();
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },
            
            // Migrate old localStorage data if exists
            async migrateFromLocalStorage() {
                const oldData = localStorage.getItem('pichaprint_history');
                if (oldData) {
                    try {
                        const parsed = JSON.parse(oldData);
                        // Clear old format since we can't restore binary data
                        localStorage.removeItem('pichaprint_history');
                        console.log('Migrated from localStorage - old history cleared (binary data unavailable)');
                    } catch (e) {
                        console.error('Migration error:', e);
                    }
                }
            }
        };
        
        const STLViewer = ({ stlData, deviceName }) => {
            const containerRef = useRef(null);
            const sceneRef = useRef(null);
            const rendererRef = useRef(null);
            const cameraRef = useRef(null);
            const controlsRef = useRef(null);
            const meshRef = useRef(null);
            const frameIdRef = useRef(null);
            
            useEffect(() => {
                if (!stlData || !containerRef.current) return;
                
                let buffer;
                if (stlData instanceof ArrayBuffer) buffer = stlData;
                else if (stlData instanceof Uint8Array) buffer = stlData.buffer.slice(stlData.byteOffset, stlData.byteOffset + stlData.byteLength);
                else return;
                
                if (!buffer || buffer.byteLength === 0) return;
                
                const container = containerRef.current;
                const width = container.clientWidth || 800;
                const height = 400;
                
                if (rendererRef.current) {
                    if (frameIdRef.current) cancelAnimationFrame(frameIdRef.current);
                    if (controlsRef.current) controlsRef.current.dispose();
                    if (meshRef.current) {
                        if (meshRef.current.geometry) meshRef.current.geometry.dispose();
                        if (meshRef.current.material) meshRef.current.material.dispose();
                    }
                    if (rendererRef.current.domElement && container.contains(rendererRef.current.domElement)) {
                        container.removeChild(rendererRef.current.domElement);
                    }
                    rendererRef.current.dispose();
                }
                
                try {
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0xffffff);
                    sceneRef.current = scene;
                    
                    const camera = new THREE.PerspectiveCamera(45, width / height, 0.01, 10000);
                    cameraRef.current = camera;
                    
                    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    renderer.setSize(width, height);
                    renderer.setPixelRatio(window.devicePixelRatio);
                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                    container.appendChild(renderer.domElement);
                    rendererRef.current = renderer;
                    
                    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                    scene.add(ambientLight);
                    
                    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
                    dirLight.position.set(5, 10, 7);
                    dirLight.castShadow = true;
                    scene.add(dirLight);
                    
                    const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
                    fillLight.position.set(-5, 0, -5);
                    scene.add(fillLight);
                    
                    const controls = new THREE.OrbitControls(camera, renderer.domElement);
                    controls.enableDamping = true;
                    controls.dampingFactor = 0.05;
                    controls.autoRotate = true;
                    controls.autoRotateSpeed = 1.0;
                    controlsRef.current = controls;
                    
                    const geometry = new THREE.STLLoader().parse(buffer);
                    geometry.computeBoundingBox();
                    const center = new THREE.Vector3();
                    geometry.boundingBox.getCenter(center);
                    geometry.translate(-center.x, -center.y, -center.z);
                    
                    const box = new THREE.Box3().setFromObject(new THREE.Mesh(geometry));
                    const size = box.getSize(new THREE.Vector3());
                    
                    const material = new THREE.MeshPhongMaterial({ 
                        color: 0xcccccc, 
                        specular: 0x444444,
                        shininess: 100,
                        flatShading: false,
                        side: THREE.DoubleSide
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    meshRef.current = mesh;
                    
                    const edgesGeometry = new THREE.EdgesGeometry(geometry, 15);
                    const edgesMaterial = new THREE.LineBasicMaterial({ 
                        color: 0x000000, 
                        linewidth: 1,
                        opacity: 0.2,
                        transparent: true
                    });
                    const edges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
                    mesh.add(edges);
                    
                    const fov = camera.fov * (Math.PI / 180);
                    const fovh = 2 * Math.atan(Math.tan(fov / 2) * camera.aspect);
                    const margin = 1.5;
                    const dx = size.z / 2 + Math.abs(size.x / 2 / Math.tan(fovh / 2));
                    const dy = size.z / 2 + Math.abs(size.y / 2 / Math.tan(fov / 2));
                    const distance = Math.max(dx, dy) * margin;
                    
                    camera.position.set(0, 0, distance);
                    camera.near = Math.max(0.01, distance / 100);
                    camera.far = Math.max(10000, distance * 10);
                    camera.updateProjectionMatrix();
                    
                    controls.target.set(0, 0, 0);
                    controls.maxDistance = distance * 3;
                    controls.minDistance = size.x / 10;
                    controls.update();
                    
                    const animate = () => {
                        frameIdRef.current = requestAnimationFrame(animate);
                        controls.update();
                        renderer.render(scene, camera);
                    };
                    animate();
                    
                    const handleResize = () => {
                        if (!containerRef.current || !cameraRef.current || !rendererRef.current) return;
                        const newWidth = containerRef.current.clientWidth;
                        const newHeight = 400;
                        cameraRef.current.aspect = newWidth / newHeight;
                        cameraRef.current.updateProjectionMatrix();
                        rendererRef.current.setSize(newWidth, newHeight);
                    };
                    
                    window.addEventListener('resize', handleResize);
                    
                    return () => {
                        window.removeEventListener('resize', handleResize);
                        if (frameIdRef.current) cancelAnimationFrame(frameIdRef.current);
                        if (controlsRef.current) controlsRef.current.dispose();
                        if (meshRef.current) {
                            if (meshRef.current.geometry) meshRef.current.geometry.dispose();
                            if (meshRef.current.material) meshRef.current.material.dispose();
                        }
                        if (rendererRef.current) {
                            if (rendererRef.current.domElement && container.contains(rendererRef.current.domElement)) {
                                container.removeChild(rendererRef.current.domElement);
                            }
                            rendererRef.current.dispose();
                        }
                    };
                } catch (err) {
                    container.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400 text-sm">Failed to load 3D model</div>';
                }
            }, [stlData, deviceName]);
            
            return (
                <div 
                    ref={containerRef} 
                    id="stl-container" 
                    className="w-full h-[400px] flex items-center justify-center relative overflow-hidden"
                >
                    {!stlData && <span className="text-gray-300 text-sm">STL preview will appear here</span>}
                </div>
            );
        };
        
        const CircuitViewer = ({ circuitData }) => {
            const containerRef = useRef(null);
            const [jointReady, setJointReady] = useState(false);
            
            useEffect(() => {
                let attempts = 0;
                const checkJoint = () => {
                    if (isJointLoaded()) {
                        setJointReady(true);
                        return;
                    }
                    attempts++;
                    if (attempts < 50) setTimeout(checkJoint, 100);
                };
                checkJoint();
            }, []);
            
            useEffect(() => {
                if (!jointReady || !circuitData || !containerRef.current) return;
                if (!circuitData.nodes || !Array.isArray(circuitData.nodes)) return;
                
                const container = containerRef.current;
                const width = container.clientWidth || 800;
                const height = 400;
                container.innerHTML = '';
                
                try {
                    const graph = new joint.dia.Graph();
                    const paper = new joint.dia.Paper({
                        el: container,
                        model: graph,
                        width: width,
                        height: height,
                        gridSize: 10,
                        drawGrid: { name: 'dot', args: { color: '#f0f0f0' }},
                        background: { color: '#fff' }
                    });
                    
                    const elements = {};
                    
                    circuitData.nodes.forEach((node, idx) => {
                        const rect = new joint.shapes.standard.Rectangle();
                        rect.position(node.x || (idx * 150 + 50), node.y || 100);
                        rect.resize(120, 60);
                        rect.attr({
                            body: { fill: '#fff', stroke: '#333', strokeWidth: 1.5, rx: 6, ry: 6 },
                            label: { text: node.label || node.id, fill: '#111', fontSize: 11, fontFamily: 'Inter, sans-serif' }
                        });
                        rect.addTo(graph);
                        elements[node.id] = rect;
                    });
                    
                    if (circuitData.connections?.forEach) {
                        circuitData.connections.forEach(conn => {
                            if (elements[conn.source] && elements[conn.target]) {
                                new joint.shapes.standard.Link({
                                    source: { id: elements[conn.source].id },
                                    target: { id: elements[conn.target].id },
                                    attrs: { line: { stroke: '#666', strokeWidth: 1.5, targetMarker: { type: 'path', d: 'M 10 -5 0 0 10 5 z', fill: '#666' }}},
                                    labels: conn.label ? [{ position: 0.5, attrs: { text: { text: conn.label, fill: '#666', fontSize: 10 }}}] : []
                                }).addTo(graph);
                            }
                        });
                    }
                    
                    const contentRect = graph.getBBox();
                    if (contentRect.width > 0) {
                        const padding = 50;
                        const scale = Math.min((width - padding * 2) / contentRect.width, (height - padding * 2) / contentRect.height, 1);
                        paper.scale(scale, scale);
                        paper.translate((width - contentRect.width * scale) / 2 - contentRect.x * scale, (height - contentRect.height * scale) / 2 - contentRect.y * scale);
                    }
                    
                    return () => paper.remove();
                } catch (err) {
                    container.innerHTML = '<div class="flex items-center justify-center h-full text-gray-400 text-sm">Failed to render circuit</div>';
                }
            }, [jointReady, circuitData]);
            
            if (!jointReady) {
                return <div className="w-full h-[400px] flex items-center justify-center bg-white rounded-xl border border-gray-200"><span className="text-gray-300 text-sm">Loading circuit viewer...</span></div>;
            }
            
            return <div ref={containerRef} id="circuit-container" className="w-full h-[400px]">{!circuitData && <span className="text-gray-300 text-sm flex items-center justify-center h-full">Circuit diagram will appear here</span>}</div>;
        };
        
        const FirmwareEditor = ({ code }) => {
            const containerRef = useRef(null);
            const editorRef = useRef(null);
            
            useEffect(() => {
                if (!containerRef.current || !code) return;
                require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }});
                require(['vs/editor/editor.main'], () => {
                    if (editorRef.current) return;
                    editorRef.current = monaco.editor.create(containerRef.current, {
                        value: code, language: 'cpp', theme: 'vs-light', automaticLayout: true,
                        minimap: { enabled: false }, scrollBeyondLastLine: false, fontSize: 13,

            const [storageReady, setStorageReady] = useState(false);
            
            const API_URL = window.ENV.API_URL + '/api/generate';
            
            // Initialize IndexedDB on mount

                Storage.init()
                    .then(() => Storage.migrateFromLocalStorage())
                    .then(() => {
                        setStorageReady(true);
                        loadHistory();
                    })
                    .catch(err => {
                        console.error('Storage init failed:', err);
                        setError('Failed to initialize storage');
                    });
            }, []);
            
            useEffect(() => {
                if (window.ENV.EMAILJS_PUBLIC_KEY && window.ENV.EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY_HERE') {
                    emailjs.init(window.ENV.EMAILJS_PUBLIC_KEY);

                    setHistory(h);

                }
            };
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading || !storageReady) return;
                setLoading(true); 
                setError(null);
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ prompt: input })
                    });
                    
                    if (!response.ok) throw new Error('Generation failed');
                    const data = await response.json();
                    
                    const baseUrl = window.ENV.API_URL;
                    const fullUrl = (url) => url.startsWith('http') ? url : `${baseUrl}${url}`;
                    
                    // Fetch all files from backend
                    const stlRes = await fetch(fullUrl(data.downloads.individual_files.stl.url));
                    if (!stlRes.ok) throw new Error('STL fetch failed');
                    const stlBuffer = await stlRes.arrayBuffer();
                    if (!stlBuffer?.byteLength) throw new Error('Empty STL');
                    
                    const output = { 
                        ...data, 
                        stlData: stlBuffer, 
                        scadContent: null, 
                        circuitData: null, 
                        firmwareContent: null, 
                        bomContent: null, 
                        original_prompt: input 
                    };
                    
                    const [scadRes, circuitRes, firmwareRes, bomRes] = await Promise.all([
                        fetch(fullUrl(data.downloads.individual_files.scad.url)),
                        fetch(fullUrl(data.downloads.individual_files.circuit.url)),
                        fetch(fullUrl(data.downloads.individual_files.firmware.url)),
                        fetch(fullUrl(data.downloads.individual_files.bom.url))
                    ]);
                    
                    if (!scadRes.ok || !circuitRes.ok || !firmwareRes.ok || !bomRes.ok) {
                        throw new Error('Some files failed to load');
                    }
                    
                    const [scadText, circuitJson, firmwareText, bomText] = await Promise.all([
                        scadRes.text(), 
                        circuitRes.json(), 
                        firmwareRes.text(), 
                        bomRes.text()
                    ]);
                    
                    output.scadContent = scadText;
                    output.circuitData = circuitJson;
                    output.firmwareContent = firmwareText;
                    output.bomContent = bomText;
                    
                    // Save to IndexedDB with FULL binary data
                    await Storage.addDesign(input, output);
                    
                    setCurrentOutput(output);
                    await loadHistory(); // Refresh history list
                    setInput('');

                    setError(err.message);

                                    {activeTab === 'scad' && (
                                        <div className="space-y-4">
                                            {currentOutput?.stlData instanceof ArrayBuffer ? (
                                                <STLViewer 
                                                    stlData={currentOutput.stlData} 
                                                    deviceName={currentOutput.device_name}
                                                    key={currentOutput.device_name + Date.now()}
                                                />
                                            ) : (
                                                <div className="w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-xl border border-gray-200">
                                                    <span className="text-gray-400 text-sm">No 3D model available</span>
                                                </div>
                                            )}
                                            <div className="bg-gray-50 rounded-xl p-4 border border-gray-100">
                                                <div className="flex items-center justify-between mb-2">
                                                    <h3 className="text-xs font-medium text-gray-500 uppercase tracking-wider">OpenSCAD Source</h3>
                                                    <button 
                                                        onClick={() => downloadFile(currentOutput.scadContent, `${currentOutput.device_name}.scad`, 'text/plain')}
                                                        className="text-xs text-gray-600 hover:text-black flex items-center gap-1"
                                                    >
                                                        <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                        </svg>
                                                        Download
                                                    </button>
                                                </div>
                                                <pre className="text-xs mono text-gray-600 overflow-auto max-h-48 p-2 bg-white rounded border border-gray-200">{currentOutput?.scadContent || 'No SCAD code available'}</pre>
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'circuit' && (
                                        <div>
                                            {currentOutput?.circuitData?.nodes ? <CircuitViewer circuitData={currentOutput.circuitData} /> : <div className="w-full h-[400px] flex items-center justify-center bg-gray-50 rounded-xl border border-gray-200"><span className="text-gray-400 text-sm">No circuit diagram available</span></div>}
                                        </div>
                                    )}
                                    {activeTab === 'firmware' && (
                                        <div>
                                            <FirmwareEditor code={currentOutput?.firmwareContent || ''} />
                                            <div className="mt-4 flex justify-end">
                                                <button 
                                                    onClick={() => downloadFile(currentOutput.firmwareContent, `${currentOutput.device_name}.ino`, 'text/plain')}
                                                    className="text-xs text-gray-600 hover:text-black flex items-center gap-1"
                                                >
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                    </svg>
                                                    Download .ino
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'bom' && (
                                        <div>
                                            <BOMTable csvData={currentOutput?.bomContent || null} />
                                            <div className="mt-4 flex justify-end">
                                                <button 
                                                    onClick={() => downloadFile(currentOutput.bomContent, `${currentOutput.device_name}_BOM.csv`, 'text/csv')}
                                                    className="text-xs text-gray-600 hover:text-black flex items-center gap-1"
                                                >
                                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                    </svg>
                                                    Download CSV
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 p-4 z-40">
                        <div className="max-w-2xl mx-auto">
                            <form onSubmit={handleSubmit} className="relative">
                                <div className="input-line flex items-center gap-2 bg-gray-50 rounded-xl px-4 py-3 border border-gray-200 focus-within:border-gray-400 transition-colors">
                                    <input 
                                        type="text" 
                                        value={input} 
                                        onChange={(e) => setInput(e.target.value)} 
                                        placeholder={currentOutput ? "Design another device..." : "Describe your hardware device..."} 
                                        className="flex-1 bg-transparent outline-none text-sm placeholder:text-gray-400" 
                                        disabled={loading || !storageReady} 
                                    />
                                    <button 
                                        type="submit" 
                                        disabled={loading || !input.trim() || !storageReady} 
                                        className="p-2 bg-black text-white rounded-lg disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-800 transition-colors"
                                    >
                                        {loading ? (
                                            <div className="flex gap-1">
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                            </div>
                                        ) : (
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M12 5l7 7-7 7" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                                {error && <div className="absolute -top-8 left-0 right-0 text-center text-xs text-red-500">{error}</div>}
                            </form>
                        </div>
                    </div>
                    
                    <BuildOrderModal 
                        isOpen={isBuildModalOpen} 
                        onClose={() => setIsBuildModalOpen(false)} 
                        currentOutput={currentOutput}
                    />
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
