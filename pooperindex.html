<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pichaprint</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.5/joint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.5/joint.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #111;
            overflow-x: hidden;
        }
        
        .mono {
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
        
        .drawer {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .drawer.open {
            transform: translateX(0);
        }
        
        .input-line {
            position: relative;
        }
        .input-line::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #111;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .input-line:focus-within::after {
            width: 100%;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .loading-dot {
            animation: blink 1.4s infinite both;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        
        #circuit-container {
            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
        }
        
        #stl-container {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border-radius: 8px;
            position: relative;
        }
        
        #monaco-container {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e5e5e5;
        }
        
        .tab-active {
            border-bottom: 2px solid #111;
            color: #111;
        }
        .tab-inactive {
            color: #999;
            border-bottom: 2px solid transparent;
        }
        .tab-inactive:hover {
            color: #666;
        }
    </style>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script>
        window.ENV = {
            API_URL: '%API_URL%'
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        const Storage = {
            getHistory: () => {
                try {
                    return JSON.parse(localStorage.getItem('pichaprint_history') || '[]');
                } catch {
                    return [];
                }
            },
            saveHistory: (history) => {
                localStorage.setItem('pichaprint_history', JSON.stringify(history));
            },
            addDesign: (input, output) => {
                const history = Storage.getHistory();
                const entry = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    input,
                    output,
                    deviceName: output?.device_name || 'unnamed'
                };
                history.unshift(entry);
                if (history.length > 50) history.pop();
                Storage.saveHistory(history);
                return entry;
            },
            clearHistory: () => {
                localStorage.removeItem('pichaprint_history');
            }
        };
        
        const STLViewer = ({ stlData }) => {
            const containerRef = useRef(null);
            const sceneRef = useRef(null);
            
            useEffect(() => {
                if (!stlData || !containerRef.current) return;
                
                const container = containerRef.current;
                const width = container.clientWidth;
                const height = 400;
                
                const scene = new THREE.Scene();
                scene.background = null;
                
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
                camera.position.set(0, 0, 100);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.innerHTML = '';
                container.appendChild(renderer.domElement);
                
                const ambientLight = new THREE.AmbientLight(0x404040, 1);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(1, 1, 1);
                scene.add(directionalLight);
                
                const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
                directionalLight2.position.set(-1, -1, -1);
                scene.add(directionalLight2);
                
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 2;
                
                const loader = new THREE.STLLoader();
                const geometry = loader.parse(stlData);
                
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                geometry.translate(-center.x, -center.y, -center.z);
                
                const material = new THREE.MeshPhongMaterial({
                    color: 0x888888,
                    specular: 0x111111,
                    shininess: 200,
                    flatShading: false
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                const box = new THREE.Box3().setFromObject(mesh);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.z = maxDim * 2.5;
                
                const animate = () => {
                    requestAnimationFrame(animate);
                    controls.update();
                    renderer.render(scene, camera);
                };
                animate();
                
                sceneRef.current = { renderer, controls };
                
                const handleResize = () => {
                    if (!containerRef.current) return;
                    const w = containerRef.current.clientWidth;
                    camera.aspect = w / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, height);
                };
                
                window.addEventListener('resize', handleResize);
                
                return () => {
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                    geometry.dispose();
                    material.dispose();
                };
            }, [stlData]);
            
            return (
                <div 
                    ref={containerRef} 
                    id="stl-container" 
                    className="w-full h-[400px] flex items-center justify-center"
                >
                    {!stlData && <span className="text-gray-400 text-sm">STL preview will appear here</span>}
                </div>
            );
        };
        
        const CircuitViewer = ({ circuitData }) => {
            const containerRef = useRef(null);
            const paperRef = useRef(null);
            
            useEffect(() => {
                if (!circuitData || !containerRef.current) return;
                
                const { nodes = [], connections = [] } = circuitData;
                
                const graph = new joint.dia.Graph();
                
                const paper = new joint.dia.Paper({
                    el: containerRef.current,
                    model: graph,
                    width: '100%',
                    height: 400,
                    gridSize: 10,
                    drawGrid: { name: 'dot', args: { color: '#e0e0e0' }},
                    background: { color: '#fafafa' },
                    interactive: true
                });
                
                paperRef.current = paper;
                
                const elements = {};
                
                nodes.forEach((node, idx) => {
                    const rect = new joint.shapes.standard.Rectangle();
                    rect.position(node.x || (idx * 150 + 50), node.y || 100);
                    rect.resize(120, 60);
                    rect.attr({
                        body: {
                            fill: '#fff',
                            stroke: '#333',
                            strokeWidth: 2,
                            rx: 4,
                            ry: 4
                        },
                        label: {
                            text: node.label || node.id,
                            fill: '#111',
                            fontSize: 12,
                            fontFamily: 'Inter, sans-serif'
                        }
                    });
                    rect.addTo(graph);
                    elements[node.id] = rect;
                });
                
                connections.forEach(conn => {
                    if (elements[conn.source] && elements[conn.target]) {
                        const link = new joint.shapes.standard.Link({
                            source: { id: elements[conn.source].id },
                            target: { id: elements[conn.target].id },
                            attrs: {
                                line: {
                                    stroke: '#666',
                                    strokeWidth: 2,
                                    targetMarker: {
                                        type: 'path',
                                        d: 'M 10 -5 0 0 10 5 z',
                                        fill: '#666'
                                    }
                                }
                            },
                            labels: [{
                                attrs: {
                                    text: {
                                        text: conn.label || '',
                                        fill: '#666',
                                        fontSize: 10
                                    }
                                }
                            }]
                        });
                        link.addTo(graph);
                    }
                });
                
                const contentRect = graph.getBBox();
                paper.translate(
                    (paper.options.width - contentRect.width) / 2 - contentRect.x,
                    (paper.options.height - contentRect.height) / 2 - contentRect.y
                );
                
                return () => {
                    paper.remove();
                };
            }, [circuitData]);
            
            return (
                <div 
                    ref={containerRef} 
                    id="circuit-container" 
                    className="w-full h-[400px] border border-gray-200"
                >
                    {!circuitData && <span className="text-gray-400 text-sm flex items-center justify-center h-full">Circuit diagram will appear here</span>}
                </div>
            );
        };
        
        const FirmwareEditor = ({ code, language = 'cpp' }) => {
            const containerRef = useRef(null);
            const editorRef = useRef(null);
            
            useEffect(() => {
                if (!containerRef.current || !code) return;
                
                require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }});
                
                require(['vs/editor/editor.main'], () => {
                    if (editorRef.current) return;
                    
                    editorRef.current = monaco.editor.create(containerRef.current, {
                        value: code,
                        language: language,
                        theme: 'vs-light',
                        automaticLayout: true,
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false,
                        fontSize: 13,
                        fontFamily: 'SF Mono, Monaco, monospace',
                        lineNumbers: 'on',
                        roundedSelection: false,
                        readOnly: true,
                        domReadOnly: true
                    });
                });
                
                return () => {
                    if (editorRef.current) {
                        editorRef.current.dispose();
                        editorRef.current = null;
                    }
                };
            }, [code, language]);
            
            return (
                <div 
                    ref={containerRef} 
                    id="monaco-container" 
                    className="w-full h-[400px]"
                >
                    {!code && <span className="text-gray-400 text-sm flex items-center justify-center h-full bg-gray-50">Firmware code will appear here</span>}
                </div>
            );
        };
        
        const BOMTable = ({ csvData }) => {
            if (!csvData) return <div className="text-gray-400 text-sm p-8 text-center bg-gray-50 rounded-lg">BOM will appear here</div>;
            
            const rows = csvData.split('\n').filter(r => r.trim());
            const headers = rows[0]?.split(',') || [];
            const data = rows.slice(1);
            
            return (
                <div className="overflow-auto max-h-[400px] border border-gray-200 rounded-lg">
                    <table className="w-full text-sm">
                        <thead className="bg-gray-50 sticky top-0">
                            <tr>
                                {headers.map((h, i) => (
                                    <th key={i} className="text-left px-4 py-3 font-medium text-gray-700 border-b">{h}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, idx) => {
                                const cols = row.split(',');
                                return (
                                    <tr key={idx} className="border-b last:border-0 hover:bg-gray-50">
                                        {cols.map((col, i) => (
                                            <td key={i} className="px-4 py-3 text-gray-600">{col}</td>
                                        ))}
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };
        
        const App = () => {
            const [drawerOpen, setDrawerOpen] = useState(false);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [currentOutput, setCurrentOutput] = useState(null);
            const [history, setHistory] = useState([]);
            const [activeTab, setActiveTab] = useState('scad');
            const [error, setError] = useState(null);
            
            const API_URL = 'https://goodn6138--ai-hardware-service-fastapi-app.modal.run/api/generate';
            
            useEffect(() => {
                setHistory(Storage.getHistory());
            }, []);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;
                
                setLoading(true);
                setError(null);
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: input })
                    });
                    
                    if (!response.ok) throw new Error('Generation failed');
                    
                    const data = await response.json();
                    
                    // Extract base URL from API_URL to construct full URLs
                    const baseUrl = API_URL.replace('/api/generate', '');
                    
                    // Helper function to convert relative URLs to absolute
                    const fullUrl = (url) => {
                        if (url.startsWith('http')) return url;
                        return `${baseUrl}${url}`;
                    };
                    
                    // Fetch STL binary with full URL
                    const stlUrl = fullUrl(data.downloads.individual_files.stl.url);
                    const stlResponse = await fetch(stlUrl);
                    if (!stlResponse.ok) throw new Error(`Failed to fetch STL from ${stlUrl}`);
                    const stlBlob = await stlResponse.blob();
                    const stlArrayBuffer = await stlBlob.arrayBuffer();
                    
                    const output = {
                        ...data,
                        stlData: stlArrayBuffer,
                        scadContent: null,
                        circuitData: null,
                        firmwareContent: null,
                        bomContent: null
                    };
                    
                    // Fetch other files in parallel with full URLs
                    const [scadRes, circuitRes, firmwareRes, bomRes] = await Promise.all([
                        fetch(fullUrl(data.downloads.individual_files.scad.url)),
                        fetch(fullUrl(data.downloads.individual_files.circuit.url)),
                        fetch(fullUrl(data.downloads.individual_files.firmware.url)),
                        fetch(fullUrl(data.downloads.individual_files.bom.url))
                    ]);
                    
                    // Check all responses
                    if (!scadRes.ok) throw new Error('Failed to fetch SCAD');
                    if (!circuitRes.ok) throw new Error('Failed to fetch circuit');
                    if (!firmwareRes.ok) throw new Error('Failed to fetch firmware');
                    if (!bomRes.ok) throw new Error('Failed to fetch BOM');
                    
                    const [scadText, circuitJson, firmwareText, bomText] = await Promise.all([
                        scadRes.text(),
                        circuitRes.json(),
                        firmwareRes.text(),
                        bomRes.text()
                    ]);
                    
                    output.scadContent = scadText;
                    output.circuitData = circuitJson;
                    output.firmwareContent = firmwareText;
                    output.bomContent = bomText;
                    
                    setCurrentOutput(output);
                    const entry = Storage.addDesign(input, output);
                    setHistory(prev => [entry, ...prev]);
                    setInput('');
                    
                } catch (err) {
                    console.error('Submit error:', err);
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            
            const loadHistoryItem = (item) => {
                setCurrentOutput(item.output);
                setDrawerOpen(false);
            };
            
            const clearAllHistory = () => {
                if (confirm('Clear all history?')) {
                    Storage.clearHistory();
                    setHistory([]);
                }
            };
            
            const downloadFile = (content, filename, type) => {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            };
            
            const downloadSTL = () => {
                if (!currentOutput?.stlData) return;
                const blob = new Blob([currentOutput.stlData], { type: 'application/sla' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentOutput.device_name}.stl`;
                a.click();
                URL.revokeObjectURL(url);
            };
            
            return (
                <div className="min-h-screen bg-white">
                    <header className="fixed top-0 left-0 right-0 h-16 bg-white border-b border-gray-100 flex items-center justify-between px-6 z-50">
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setDrawerOpen(true)}
                                className="p-2 hover:bg-gray-100 rounded-lg transition-colors"
                            >
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 12h16M4 18h16" />
                                </svg>
                            </button>
                            <h1 className="text-lg font-bold tracking-tight lowercase">pichaprint</h1>
                        </div>
                    </header>
                    
                    <div className={`fixed inset-0 z-50 ${drawerOpen ? 'pointer-events-auto' : 'pointer-events-none'}`}>
                        <div 
                            className={`absolute inset-0 bg-black/20 transition-opacity ${drawerOpen ? 'opacity-100' : 'opacity-0'}`}
                            onClick={() => setDrawerOpen(false)}
                        />
                        <div className={`drawer absolute left-0 top-0 bottom-0 w-80 bg-white shadow-2xl ${drawerOpen ? 'open' : ''}`}>
                            <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                                <h2 className="font-semibold text-sm uppercase tracking-wider text-gray-500">History</h2>
                                <button onClick={() => setDrawerOpen(false)} className="p-1 hover:bg-gray-100 rounded">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                            <div className="overflow-auto h-[calc(100vh-80px)]">
                                {history.length === 0 ? (
                                    <div className="p-6 text-sm text-gray-400 text-center">No designs yet</div>
                                ) : (
                                    <>
                                        <div className="p-2">
                                            <button 
                                                onClick={clearAllHistory}
                                                className="w-full py-2 text-xs text-red-500 hover:bg-red-50 rounded transition-colors"
                                            >
                                                Clear all history
                                            </button>
                                        </div>
                                        {history.map((item) => (
                                            <button
                                                key={item.id}
                                                onClick={() => loadHistoryItem(item)}
                                                className="w-full text-left p-4 border-b border-gray-50 hover:bg-gray-50 transition-colors group"
                                            >
                                                <div className="font-medium text-sm text-gray-900 truncate">{item.input}</div>
                                                <div className="text-xs text-gray-400 mt-1 flex items-center gap-2">
                                                    <span>{item.deviceName}</span>
                                                    <span>·</span>
                                                    <span>{new Date(item.timestamp).toLocaleDateString()}</span>
                                                </div>
                                            </button>
                                        ))}
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <main className="pt-24 pb-32 px-6 max-w-6xl mx-auto">
                        {!currentOutput ? (
                            <div className="flex flex-col items-center justify-center min-h-[60vh]">
                                <h2 className="text-3xl md:text-4xl font-semibold text-center text-gray-900">
                                    design hardware from text
                                </h2>
                                <p className="text-sm text-gray-400 italic mt-4 mb-16">
                                    tunajua uko blank , uliza ; - P
                                </p>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="flex items-center justify-between pb-4 border-b border-gray-100">
                                    <div>
                                        <h2 className="text-xl font-semibold">{currentOutput.device_name}</h2>
                                        <p className="text-sm text-gray-400 mt-1">
                                            Generated {new Date(currentOutput.generated_at).toLocaleString()}
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => downloadFile(currentOutput.scadContent, `${currentOutput.device_name}.scad`, 'text/plain')}
                                            className="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors"
                                        >
                                            Download SCAD
                                        </button>
                                        <button 
                                            onClick={downloadSTL}
                                            className="px-4 py-2 text-sm bg-black text-white rounded-lg hover:bg-gray-800 transition-colors"
                                        >
                                            Download STL
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex gap-6 border-b border-gray-100">
                                    {[
                                        { id: 'scad', label: '3D View' },
                                        { id: 'circuit', label: 'Circuit' },
                                        { id: 'firmware', label: 'Firmware' },
                                        { id: 'bom', label: 'BOM' }
                                    ].map(tab => (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`pb-3 text-sm font-medium transition-colors ${activeTab === tab.id ? 'tab-active' : 'tab-inactive'}`}
                                        >
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                                
                                <div className="py-4">
                                    {activeTab === 'scad' && (
                                        <div className="space-y-4">
                                            <STLViewer stlData={currentOutput.stlData} />
                                            <div className="bg-gray-50 rounded-lg p-4">
                                                <h3 className="text-sm font-medium mb-2 text-gray-700">OpenSCAD Code</h3>
                                                <pre className="text-xs mono text-gray-600 overflow-auto max-h-48">{currentOutput.scadContent}</pre>
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === 'circuit' && (
                                        <CircuitViewer circuitData={currentOutput.circuitData} />
                                    )}
                                    {activeTab === 'firmware' && (
                                        <FirmwareEditor code={currentOutput.firmwareContent} />
                                    )}
                                    {activeTab === 'bom' && (
                                        <BOMTable csvData={currentOutput.bomContent} />
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 z-40">
                        <div className="max-w-3xl mx-auto">
                            <form onSubmit={handleSubmit} className="relative">
                                <div className="input-line flex items-center gap-2 bg-gray-50 rounded-2xl px-4 py-3 border border-gray-200 focus-within:border-gray-400 transition-colors">
                                    <input
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        placeholder={currentOutput ? "Design another device..." : "Describe your hardware device..."}
                                        className="flex-1 bg-transparent outline-none text-sm placeholder:text-gray-400"
                                        disabled={loading}
                                    />
                                    <button 
                                        type="submit"
                                        disabled={loading || !input.trim()}
                                        className="p-2 bg-black text-white rounded-xl disabled:opacity-30 disabled:cursor-not-allowed hover:bg-gray-800 transition-colors"
                                    >
                                        {loading ? (
                                            <div className="flex gap-1">
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                                <span className="loading-dot w-1 h-1 bg-white rounded-full"></span>
                                            </div>
                                        ) : (
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M12 5l7 7-7 7" />
                                            </svg>
                                        )}
                                    </button>
                                </div>
                                {error && (
                                    <div className="absolute -top-8 left-0 right-0 text-center text-xs text-red-500">
                                        {error}
                                    </div>
                                )}
                            </form>
                        </div>
                    </div>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
